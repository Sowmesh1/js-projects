<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="add" id="add">
        <img src="https://cdn-icons-png.flaticon.com/512/4601/4601618.png" style="width: 10vh; height: 10vh;">
    </button>

    <div class="task">
       <input type="checkbox" style="height:5vh; width: 10vh;">
       <button class="delete"><img src="https://cdn-icons-png.flaticon.com/256/3405/3405244.png" style="width: 5vh; height: 5vh;"></button>
    </div>

    <div class="hidden">
        <div class="input_window"></div>
    </div>
</body>
</html>
